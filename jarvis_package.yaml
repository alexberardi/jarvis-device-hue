schema_version: 1
name: philips_hue
display_name: Philips Hue RGB Lights
description: >-
  Philips Hue light discovery and control via local Bridge API.
  Supports on/off, brightness, RGB color, color temperature, and
  voice commands for natural light control.
version: 1.0.0
min_jarvis_version: "0.9.0"
license: MIT

author:
  github: alexberardi

categories:
  - smart-home

keywords:
  - hue
  - philips
  - light
  - rgb
  - brightness
  - color
  - smart-home
  - bulb

platforms: []

components:
  - type: device_protocol
    name: hue
    path: device_families/hue/protocol.py
    description: Philips Hue bridge device discovery and control

  - type: command
    name: control_hue_lights
    path: commands/control_hue_lights/command.py
    description: Voice command for controlling Hue RGB lights

packages:
  - name: httpx

secrets:
  - key: HUE_BRIDGE_IP
    scope: integration
    value_type: string
    description: Local IP address of your Philips Hue Bridge (e.g., 192.168.1.42)
    required: true
    is_sensitive: false
    friendly_name: Bridge IP

  - key: HUE_USERNAME
    scope: integration
    value_type: string
    description: Hue Bridge API username (created via link button + POST /api)
    required: true
    is_sensitive: true
    friendly_name: API Username
